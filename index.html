<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cooking — Recipes</title>
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body>
  <div class="container">
    <header class="site-header">
      <h1 class="site-header__title">Cooking</h1>
      <p class="site-header__subtitle">A small collection of recipes worth making again.</p>
    </header>
    <ul class="recipe-grid" id="recipe-grid"></ul>
  </div>

  <div class="modal" id="recipe-modal" hidden>
    <div class="modal__backdrop" data-close></div>
    <div class="modal__panel" role="dialog" aria-modal="true">
      <button class="modal__close" type="button" data-close aria-label="Close">&times;</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <script src="js/recipe-render.js"></script>
  <script src="js/home.js"></script>
</body>
</html>
