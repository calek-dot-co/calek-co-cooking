name: Build recipe index

on:
  push:
    branches: [main]
    paths:
      - "recipes/**"
      - "scripts/build-index.mjs"

permissions:
  contents: write

jobs:
  build-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate recipes/index.json
        run: node scripts/build-index.mjs

      - name: Commit index if changed
        run: |
          if ! git diff --quiet -- recipes/index.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add recipes/index.json
            git commit -m "Update recipe index"
            git push
          fi
